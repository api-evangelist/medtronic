specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Medtronic
providerId: medtronic
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Medical Devices
description: Medtronic is a global medical device manufacturer (cardiac, neuromodulation, diabetes,
  surgical, structural heart). Medtronic provides a developer.medtronic.com portal for approved partners
  in selected programs (e.g. CareLink Personal / Professional integrations, diabetes data platform,
  Touch Surgery education content) but does not publish per-API or per-call pricing on the public site;
  access is granted under partner / clinical-integration agreements scoped to the underlying device
  product line. Device sales economics are governed by hospital purchase orders and reimbursement codes,
  not by API metering.
notes: |
  Public developer portal exists for partner integrations but no public per-API pricing. Set
  reconciled=true once specific program pricing or rate sheets are surfaced.
sources:
  - https://developer.medtronic.com/
  - https://www.medtronic.com/
plans:
  - id: medtronic-developer-program
    name: Approved Developer / Partner Program
    type: enterprise
    description: Access to Medtronic developer programs (e.g. CareLink connectivity, diabetes data
      platform, Touch Surgery, hospital integration interfaces) is granted to approved partners under
      program-specific agreements. Costs are governed by the underlying device / clinical contract,
      not by per-API SKUs.
    entries:
      - label: Developer Program Access
        description: API access is granted on application acceptance; commercial obligations sit inside
          the partner agreement for each program.
        name: developer_access
        type: tiered
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://developer.medtronic.com
        unit: 1
        price: 'contact program'
        userMultiplied: false
      - label: Underlying Device / Clinical Contract
        description: Where applicable, the economic value flows through device purchase orders, service
          contracts, and reimbursement codes for the underlying device line; APIs are bundled with that
          contract.
        name: device_contract
        type: subscription
        metric: device
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: 'per device contract'
        userMultiplied: false
    elements:
      - name: CareLink Connectivity (Cardiac / Diabetes)
      - name: Diabetes Data Platform
      - name: Hospital / EHR Integration Interfaces
      - name: Touch Surgery Education Content
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
