specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Medtronic
providerId: medtronic
publisherName: Medtronic plc
serviceCategory: Medical Devices / Connected Health
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Healthcare
  - Medical Devices
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Medtronic: connected medical-device platform where APIs
  are bundled with device / service contracts. Cost is allocated by program, device line, and reimbursement
  context rather than per-API-call billing.'
notes: |
  No public per-API pricing. Meters reflect partner-program economic units (active devices, patient
  records, clinician seats) rather than raw API requests.
sources:
  - https://developer.medtronic.com/
  - https://www.medtronic.com/
principles:
  - name: Visibility
    description: Track integration consumption by program (CareLink, diabetes platform, EHR connectivity)
      via the Medtronic developer portal usage view; reconcile against partner agreements and device
      service contracts.
  - name: Allocation
    description: Allocate by partner program, device line, and care setting (hospital, clinic, home).
      For payors and ACOs, allocate by attributed patient population.
  - name: Optimization
    description: Reduce sync frequency for non-clinically-critical telemetry, cache device metadata, and
      consolidate integrations per care setting (single connector for cardiac + diabetes where both
      programs are present).
  - name: Accountability
    description: Assign a clinical integration owner per program responsible for compliance with HIPAA /
      GDPR controls, partner agreement renewals, and clinical workflow validation.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Bundled with Device / Service Contract
  billingFrequency: Annual / Per-Device
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
    - Credit
focusColumns:
  ServiceName: Medtronic Developer Programs
  ServiceCategory: Medical Devices / Connected Health
  ProviderName: Medtronic
  PublisherName: Medtronic plc
  InvoiceIssuerName: Medtronic, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: connected_devices
    description: Devices actively reporting telemetry through Medtronic platforms.
    unit: device-month
    aggregation: avg
    dimensions:
      - device_line
      - care_setting
      - region
  - name: patient_records
    description: Distinct patient records integrated under HIPAA / GDPR-permitted scope.
    unit: patient-month
    aggregation: avg
    dimensions:
      - program
      - region
  - name: clinician_seats
    description: Clinician users active in CareLink / EHR integration consoles.
    unit: seat-month
    aggregation: avg
    dimensions:
      - program
      - care_setting
  - name: telemetry_events
    description: Clinical telemetry events ingested (e.g. CGM readings, pacemaker check-ins).
    unit: event
    aggregation: sum
    dimensions:
      - device_line
      - region
apis:
  - name: Medtronic API
    baseURL: https://api.medtronic.com
    tags:
      - Healthcare
      - Medical Devices
    serviceName: Medtronic API
    serviceCategory: API
unitEconomics:
  - name: Cost per Connected Device
    metric: program_cost / connected_devices
    target: TBD
  - name: Cost per Patient Record
    metric: program_cost / patient_records
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
